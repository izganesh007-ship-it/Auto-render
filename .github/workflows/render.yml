name: Render Documentary
on: [push]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      # STEP 1: This downloads your code from GitHub to the runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # STEP 2: Show files (helps us debug if it fails again)
      - name: Debug File List
        run: ls -R

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Install FFMPEG
        run: sudo apt-get install -y ffmpeg

      - name: Render Video
        # We use 'npx remotion render' and target the specific file
        run: npx remotion render src/index.tsx main out.mp4 --overwrite

      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: finance-documentary
          path: out.mp4
