name: Render Documentary
on: [push]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Install FFMPEG
        run: sudo apt-get install -y ffmpeg

      - name: Render Video
        # Changed 'main' to 'DynamicComp' to match your project's composition ID
        run: npx remotion render src/remotion/index.ts DynamicComp out.mp4 --overwrite

      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: finance-documentary
          path: out.mp4