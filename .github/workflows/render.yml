name: Render Documentary
on: [push]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Install FFMPEG
        run: sudo apt-get install -y ffmpeg

      - name: Render Video
        # Note: I changed the path to src/remotion/index.ts based on your file list
        run: npx remotion render src/remotion/index.ts main out.mp4 --overwrite

      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: finance-documentary
          path: out.mp4